services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: photoheadshot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: photoheadshotdb
    volumes:
      - photoheadshot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoheadshot -d photoheadshotdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/dhiodhaha/photoheadshotai:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  photoheadshot_pgdata:
