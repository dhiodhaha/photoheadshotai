name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to VPS via Tailscale
        run: |
          # Deploy nginx config
          scp -o StrictHostKeyChecking=no nginx/photoheadshot.conf deploy@${{ secrets.VPS_TAILSCALE_HOSTNAME }}:/tmp/photoheadshot.conf
          ssh -o StrictHostKeyChecking=no deploy@${{ secrets.VPS_TAILSCALE_HOSTNAME }} << 'EOF'
            sudo cp /tmp/photoheadshot.conf /etc/nginx/sites-enabled/standoutheadshot.conf
            sudo nginx -t && sudo systemctl reload nginx
            cd /opt/photoheadshot
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
          EOF
